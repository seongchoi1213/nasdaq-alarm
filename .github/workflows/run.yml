name: Market Report Bot

on:
  schedule:
    - cron: '0 23 * * *'  # 한국 오전 08:00 (UTC 23:00)
    - cron: '30 2 * * *'  # 한국 오전 11:30 (UTC 02:30)
  workflow_dispatch:      # 테스트용 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install yfinance requests pytz
      - name: Run script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
