name: Nasdaq & Kospi & BTC Bot
on:
  schedule:
    # 1. 한국 시간 06:10 (미국장 마감 분석)
    - cron: '10 21 * * *'
    # 2. 한국 시간 10:35 (국장 수급 분석)
    - cron: '35 1 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    env:
      # 2026년 9월 Node 20 완전 제거에 대비한 강제 설정
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      # Node 24를 지원하는 최신 버전으로 지정
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Libraries
        run: |
          python -m pip install --upgrade pip
          pip install yfinance requests pandas pytz
        
      - name: Run Python Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELE
