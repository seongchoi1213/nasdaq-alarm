name: Nasdaq & Kospi Bot
on:
  schedule:
    # 1. 한국 시간 06:10 (UTC 21:10) - 미국장 분석용
    - cron: '10 21 * * *'
    # 2. 한국 시간 10:35 (UTC 01:35) - 국장 분석용
    - cron: '35 1 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Libraries
        # pytz 라이브러리가 추가되었으니 꼭 설치 목록에 넣어야 합니다.
        run: pip install yfinance requests pandas pytz
      - name: Run Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
